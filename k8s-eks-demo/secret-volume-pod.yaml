apiVersion: v1
kind: Pod
metadata:
  name: secret-volume-pod
spec:
  containers:
  - name: app
    image: alpine
    command: ["sleep", "infinity"]
    volumeMounts:
    - name: secret-volume
      mountPath: /etc/secrets 
      readOnly: true
  volumes:
  - name: secret-volume
    secret:
      secretName: app-secret
