apiVersion: v1
kind: Pod
metadata:
  name: secret-env-pod
spec:
  containers:
  - name: app
    image: alpine
    command: ["sleep", "infinity"]
    env:
    - name: API_KEY
      valueFrom:
        secretKeyRef: 
          name: app-secret
          key: api-key
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: db-password
    - name: SERVICE_TOKEN
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: service-token
