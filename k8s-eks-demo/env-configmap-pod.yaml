apiVersion: v1
kind: Pod
metadata:
  name: env-configmap
spec:
  containers:
  - name: app
    image: alpine
    command: ["sleep", "infinity"]
    env:
    - name: DATABASE_HOST
      valueFrom:
        configMapKeyRef:
          name: db-config
          key: DB_HOST
    - name: DATABASE_PORT
      valueFrom:
        configMapKeyRef:
          name: db-config
          key: DB_PORT
    - name: DATABASE_NAME
      valueFrom: 
        configMapKeyRef:
          name: db-config
          key: DB_NAME
